{% extends 'admin/base_admin.html' %}

{% block content %}

<style>
.page-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 15px;
}

.main-card {
    width: 100%;
    max-width: 500px;
    margin: auto;
    background: #e9e9e9;
    border: 1px solid #cccccc;
    border-radius: 25px;
    padding: 30px 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

.main-card i{
    color: #216b25;
    font-size: 1.2em;
}

.title {
    text-align: center;
    font-weight: 600;
    margin-bottom: 25px;
}

.form-control {
    border: 1px solid #d6d6d6;
    border-radius: 12px;
    padding: 10px;
}

.btn-save {
    border-radius: 14px;
    padding: 12px;
    font-weight: 600;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* MOBILE AJUSTES */
@media (max-width: 576px) {
    .main-card {
        padding: 25px 15px;
    }

    .title {
        font-size: 20px;
    }
}
</style>

<div class="page-wrapper">

    <div class="main-card">
        <h2 class="title d-flex justify-content-center align-items-center gap-2">
            <i class="bi bi-plus-circle"></i>
            Novo Serviço
        </h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Nome</label>
                <input type="text" name="nome" class="form-control" placeholder="Nome do serviço" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea name="descricao" class="form-control" rows="3" placeholder="Descreva o serviço..." required></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label">Preço</label>
                <input type="number" step="0.01" name="preco" class="form-control" placeholder="R$ 0,00" required>
            </div>
            
            <div class="mb-3">
                <label>Duração (minutos)</label>
                <input type="number" name="duracao_minutos" class="form-control" placeholder="Ex: 60" required>
            </div>

            <div class="d-flex gap-3 mt-4">
                <a href="{% url 'listar_servicos' %}" class="btn btn-secondary w-50 btn-save">
                    Voltar
                </a>

                <button type="submit" class="btn btn-success w-50 btn-save">
                    Salvar Serviço
                </button>
            </div>

        </form>

    </div>

</div>

{% endblock %}

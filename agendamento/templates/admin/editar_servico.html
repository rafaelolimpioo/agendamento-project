{% extends 'admin/base_admin.html' %}

{% block title %}{% endblock %}

{% block extra_css %}
<style>
    body {
        background: #d9d9d9;
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
    }

    .page-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
    }

    .main-card {
        width: 100%;
        max-width: 560px;
        background: #f8f8f8;
        border-radius: 24px;
        padding: 28px 22px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.15);
    }

    .page-title {
        margin: 0 0 24px 0;
        font-size: 1.7rem;
        font-weight: 700;
        color: #111827;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        text-align: center;
    }

    .page-title i {
        color: #0d6efd;
        font-size: 1.2em;
    }

    .form-label {
        font-weight: 600;
        color: #1f2937;
        margin-bottom: 8px;
    }

    .form-control {
        border-radius: 14px;
        padding: 12px 14px;
        border: 1px solid #d1d5db;
        background-color: #ffffff;
        color: #111827;
        transition: all 0.2s ease;
    }

    .form-control:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
    }

    textarea.form-control {
        min-height: 130px;
        resize: vertical;
    }

    .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
    }

    .form-actions .btn {
        flex: 1;
        border-radius: 14px;
        padding: 12px 16px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .btn-cancel {
        background-color: #6b7280;
        color: #fff;
        border: none;
    }

    .btn-cancel:hover {
        background-color: #5b6470;
        color: #fff;
    }

    .btn-save {
        background-color: #0d6efd;
        color: #fff;
        border: none;
    }

    .btn-save:hover {
        background-color: #0b5ed7;
        color: #fff;
    }

    @media (max-width: 767.98px) {
        .page-wrapper {
            padding: 12px;
            align-items: flex-start;
        }

        .main-card {
            max-width: 100%;
            padding: 22px 16px;
            border-radius: 20px;
            margin-top: 12px;
        }

        .page-title {
            font-size: 1.35rem;
            margin-bottom: 20px;
        }

        .form-control {
            padding: 11px 12px;
        }

        .form-actions {
            flex-direction: column-reverse;
        }

        .form-actions .btn {
            width: 100%;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="main-card">

        <h2 class="page-title">
            <i class="bi bi-pencil-square"></i>
            Editar Serviço
        </h2>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input
                    type="text"
                    id="nome"
                    name="nome"
                    class="form-control"
                    value="{{ servico.nome }}"
                    placeholder="Nome do serviço"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="descricao" class="form-label">Descrição</label>
                <textarea
                    id="descricao"
                    name="descricao"
                    class="form-control"
                    placeholder="Descreva o serviço"
                    required
                >{{ servico.descricao }}</textarea>
            </div>

            <div class="mb-3">
                <label for="preco" class="form-label">Preço</label>
                <input
                    type="number"
                    step="0.01"
                    id="preco"
                    name="preco"
                    class="form-control"
                    value="{{ servico.preco }}"
                    placeholder="R$ 0,00"
                    required
                >
            </div>

            <div class="mb-3">
                <label>Duração</label>
                <div class="input-group">
                    <input 
                        type="number" 
                        name="duracao_minutos" 
                        class="form-control"
                        value="{{ servico.duracao_minutos }}"
                        required
                    >
                    <span class="input-group-text">min</span>
                </div>
            </div>

            <div class="form-actions">
                <a href="{% url 'listar_servicos' %}" class="btn btn-cancel">
                    <i class="bi bi-arrow-left"></i>
                    Cancelar
                </a>

                <button type="submit" class="btn btn-save">
                    <i class="bi bi-check2-circle"></i>
                    Salvar Alterações
                </button>
            </div>
        </form>

    </div>
</div>
{% endblock %}
